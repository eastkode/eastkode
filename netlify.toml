# Static site — no build step. Publish repo root as-is.
[build]
  publish = "."
  command = "echo 'Static site — publish root'"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

# Pretty URLs / SPA not needed — keep direct .html routes working
[[redirects]]
  from = "/privacy-policy"
  to = "/privacy-policy.html"
  status = 301

[[redirects]]
  from = "/terms-and-conditions"
  to = "/terms-and-conditions.html"
  status = 301

[[redirects]]
  from = "/refund-policy"
  to = "/refund-policy.html"
  status = 301
